# =============================================================================
# MediaHub v2 — Composite action: Flutter setup (ADR-014)
# =============================================================================
# Pinned Flutter SDK via fvm config. Cached pub-cache keyed on pubspec.lock hash.
# Adds pub-cache bin to PATH so globally activated packages (melos) work.
name: setup-flutter
description: "Install pinned Flutter SDK + restore pub cache + add to PATH"
inputs:
  pubspec-lock-path:
    description: "Path to pubspec.lock (for cache key)"
    required: false
    default: "pubspec.lock"
runs:
  using: composite
  steps:
    - name: Setup Flutter via FVM config
      uses: kuhnroyal/flutter-fvm-config-action/setup@v3
      with:
        path: '.fvm/fvm_config.json' # تحديد مسار ملف الإعدادات الخاص بك بدقة

    - name: Configure Flutter (no analytics)
      shell: bash
      run: |
        # تم إزالة fvm من هنا لأن Flutter أصبح متاحاً بشكل مباشر في النظام
        flutter config --no-analytics
        dart --disable-analytics

    - name: Cache pub packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.pub-cache
          .dart_tool
        key: pub-${{ runner.os }}-${{ hashFiles(inputs.pubspec-lock-path) }}
        restore-keys: |
          pub-${{ runner.os }}-

    - name: Add pub-cache bin to PATH
      shell: bash
      run: |
        # إضافة مسار الحزم (pub-cache) فقط لضمان عمل أدوات مثل melos
        echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

    - name: Flutter doctor
      shell: bash
      run: flutter doctor -v