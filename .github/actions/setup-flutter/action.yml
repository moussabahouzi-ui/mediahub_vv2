# =============================================================================
# MediaHub v2 — Composite action: Flutter setup (FIXED)
# =============================================================================
# FIX: Reads Flutter version from .fvm/fvm_config.json (no external action needed).
# Falls back to 3.29.0 if FVM config is missing.

name: setup-flutter
description: "Install pinned Flutter SDK + restore pub cache"
inputs:
  pubspec-lock-path:
    description: "Path to pubspec.lock (for cache key)"
    required: false
    default: "pubspec.lock"
runs:
  using: composite
  steps:
    - name: Read FVM version
      id: fvm
      shell: bash
      run: |
        if [ -f .fvm/fvm_config.json ]; then
          # Extract flutterSdkVersion from JSON (no external dependency)
          VERSION=$(cat .fvm/fvm_config.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('flutterSdkVersion','3.29.0'))")
        else
          VERSION="3.29.0"
          echo "⚠️ .fvm/fvm_config.json not found, using fallback $VERSION"
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Flutter version: $VERSION"

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ steps.fvm.outputs.version }}
        channel: 'stable'
        cache: true

    - name: Disable analytics
      shell: bash
      run: |
        flutter config --no-analytics
        dart --disable-analytics

    - name: Cache pub packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.pub-cache
          .dart_tool
        key: pub-${{ runner.os }}-${{ hashFiles(inputs.pubspec-lock-path) }}
        restore-keys: |
          pub-${{ runner.os }}-

    - name: Flutter doctor
      shell: bash
      run: flutter doctor -v
