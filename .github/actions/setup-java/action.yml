# =============================================================================
# MediaHub v2 — Composite action: Java setup (ADR-014)
# =============================================================================
# Temurin JDK 17. Pinned. Compatible with AGP 8.7.x and Gradle 8.11.x.
# Includes Python setup for Chaquopy Gradle plugin compilation.
name: setup-java
description: "Install Temurin JDK 17, Python 3.11 (for Chaquopy), and cache Gradle deps"
inputs:
  gradle-cache-key:
    description: "Cache key suffix (defaults to libs.versions.toml hash)"
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Setup Temurin JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Setup Python for Chaquopy
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: |
          gradle-${{ runner.os }}-${{ inputs.gradle-cache-key || hashFiles('android/gradle/libs.versions.toml', 'android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-