# =============================================================================
# MediaHub v2 — Composite action: Python setup (FIXED)
# =============================================================================
# FIX: Handles missing requirements-dev.txt gracefully (Phase 0).
# Always installs core tools (pytest, ruff, mypy, pip-audit).

name: setup-python
description: "Install Python 3.11 + dev deps + restore cache"
inputs:
  requirements-path:
    description: "Path to requirements-dev.txt"
    required: false
    default: "python/requirements-dev.txt"
runs:
  using: composite
  steps:
    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: pip
        cache-dependency-path: ${{ inputs.requirements-path }}

    - name: Install Python tooling
      shell: bash
      run: |
        python -m pip install --upgrade pip

        # Install dev requirements if present (optional in Phase 0)
        REQ="${{ inputs.requirements-path }}"
        if [ -f "$REQ" ] && [ -s "$REQ" ]; then
          echo "Installing dev requirements from $REQ"
          pip install -r "$REQ"
        else
          echo "⚠️ $REQ not found or empty — skipping (Phase 0)"
        fi

        # Core CI tools (always installed)
        pip install pytest ruff mypy pip-audit

    - name: Show versions
      shell: bash
      run: |
        python --version
        pytest --version
        ruff --version
        mypy --version
        pip-audit --version
