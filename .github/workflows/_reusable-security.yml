# =============================================================================
# MediaHub v2 — Reusable workflow: security scan (ADR-011/015)
# =============================================================================
name: _reusable-security
on:
  workflow_call:

jobs:
  security:
    name: Secret scan + dependency audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks — secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip-audit — Python dependency audit
        run: |
          pip install pip-audit
          cd python
          if [ -s requirements.lock ]; then
            pip-audit -r requirements.lock
          fi
          pip-audit -r requirements-dev.txt

      - uses: ./.github/actions/setup-flutter

      - name: pub audit
        run: |
          flutter pub audit --no-fatal-infos
          flutter pub outdated --no-dev-dependencies || true
