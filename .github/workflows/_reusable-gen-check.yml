# =============================================================================
# MediaHub v2 — Reusable workflow: code generation check (ADR-004/015)
# =============================================================================
# Runs build_runner + pigeon and asserts the working tree is clean.
# FIX: Also checks for UNTRACKED generated files (not just modified).
name: _reusable-gen-check
on:
  workflow_call:

jobs:
  gen-check:
    name: Generated-files check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-flutter

      - name: melos bootstrap
        run: |
          rm -rf ~/.pub-cache/global_packages/melos
          fvm flutter pub global activate melos
          fvm exec melos bootstrap

      - name: Run build_runner + pigeon
        run: bash tools/gen.sh

      - name: Verify working tree is clean (tracked + untracked)
        run: |
          # Check tracked files changed
          if ! git diff --exit-code; then
            echo "::error::Tracked generated files are out of date. Run 'bash tools/gen.sh' locally."
            git diff --stat
            exit 1
          fi
          # Check untracked files (new .g.dart, .freezed.dart, etc.)
          UNTRACKED=$(git status --porcelain | grep '^??' || true)
          if [ -n "$UNTRACKED" ]; then
            echo "::error::Untracked generated files found. Add them to git:"
            echo "$UNTRACKED"
            exit 1
          fi
        env:
          GIT_AUTHOR_NAME: ci
          GIT_AUTHOR_EMAIL: ci@mediahub.local
          GIT_COMMITTER_NAME: ci
          GIT_COMMITTER_EMAIL: ci@mediahub.local
