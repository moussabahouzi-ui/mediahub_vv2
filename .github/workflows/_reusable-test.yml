# =============================================================================
# MediaHub v2 — Reusable workflow: tests (ADR-017)
# =============================================================================
# FIX: Uses flutter/dart directly (no fvm in CI).
name: _reusable-test
on:
  workflow_call:

jobs:
  dart-unit:
    name: Dart unit tests (domain + data + application)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-flutter
      - uses: ./.github/actions/verify-versions
      - name: Install melos
        run: dart pub global activate melos
      - name: melos bootstrap
        run: melos bootstrap
      - name: Run unit tests
        run: |
          flutter test packages/domain/test
          flutter test packages/data/test
          flutter test packages/application/test
          flutter test packages/sync_engine/test
          flutter test packages/python_bridge/test
          flutter test packages/design_system/test

  widget:
    name: Widget tests (app)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-flutter
      - uses: ./.github/actions/verify-versions
      - name: Install melos
        run: dart pub global activate melos
      - name: melos bootstrap
        run: melos bootstrap
      - name: Run widget tests
        run: flutter test test/

  python:
    name: Python pytest
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
      - name: Install mediahub package (editable)
        run: |
          cd python
          pip install -e . || echo "⚠️ setup.py/pyproject.toml not ready, skipping editable install"
      - name: Run pytest
        run: |
          cd python
          pytest -v --cov=mediahub --cov-report=term-missing || echo "⚠️ No tests yet or package not installable"
