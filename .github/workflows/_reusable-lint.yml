# =============================================================================
# MediaHub v2 — Reusable workflow: lint + format + analyzer (ADR-002/015)
# =============================================================================
name: _reusable-lint

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          cache: true

      - name: Install & Bootstrap Melos
        run: |
          dart pub global activate melos
          melos bootstrap

      - name: Make scripts executable
        run: chmod +x ./tools/*.sh

      - name: Run Linting
        run: melos run lint
