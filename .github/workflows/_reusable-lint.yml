# =============================================================================
# MediaHub v2 — Reusable workflow: lint + format + analyzer (ADR-002/015)
# =============================================================================
name: _reusable-lint
on:
  workflow_call:

jobs:
  lint:
    name: Lint + analyzer + ADR-002 import check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-flutter

      - uses: ./.github/actions/verify-versions

      - name: melos bootstrap
        run: |
          dart pub global activate melos 6.2.0
          melos bootstrap

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze .

      - name: custom_lint (riverpod_lint)
        run: dart run custom_lint

      - name: ADR-002 import-rule check
        run: bash tools/check_imports.sh

      - name: Ruff (Python lint + format)
        run: |
          cd python
          pip install ruff
          ruff check .
          ruff format --check .

      - name: Mypy (Python types)
        run: |
          cd python
          pip install mypy
          mypy mediahub
