# =============================================================================
# MediaHub v2 — main branch workflow (ADR-015)
# =============================================================================
# Full suite on push to main. Includes release-build preparation (unsigned).
name: main

on:
  push:
    branches: [main]

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gen-check:
    name: Generated-files check
    uses: ./.github/workflows/_reusable-gen-check.yml

  lint:
    name: Lint + analyzer + ADR-002 import check
    uses: ./.github/workflows/_reusable-lint.yml

  test:
    name: Tests (Dart + Python)
    uses: ./.github/workflows/_reusable-test.yml

  security:
    name: Secret scan + audit
    uses: ./.github/workflows/_reusable-security.yml

  build-debug:
    name: Build debug APK
    uses: ./.github/workflows/_reusable-build.yml
    with:
      build-type: debug

  build-release-prep:
    name: Build release APK (unsigned — Phase 0)
    uses: ./.github/workflows/_reusable-build.yml
    with:
      build-type: release
    # Phase 1+ (ADR-016) will replace this with the signed release pipeline
    # that runs only on release/* branches inside the pinned Docker image.
