# =============================================================================
# MediaHub v2 — Nightly workflow (ADR-015/017)
# =============================================================================
# Heavier checks that run off-prime time: reproducibility verification (ADR-014)
# + full Python lint with strict mypy + wheel-fingerprint check (ADR-007/018).
#
# TD-C6 fix (Architecture Review Gate): the reproducibility check now
# discovers release APKs dynamically instead of assuming `app-release.apk`.
# With ABI splits enabled (android/app/build.gradle.kts `splits.abi`),
# `flutter build apk --release` produces one APK per ABI:
#   app-arm64-v8a-release.apk
#   app-armeabi-v7a-release.apk
#   app-x86_64-release.apk
# The check now hashes ALL release APKs and compares the combined hash set
# across two clean builds. This verifies reproducibility per-ABI without
# depending on a single filename.
name: nightly

on:
  schedule:
    # 02:30 UTC daily
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  reproducibility:
    name: Reproducibility check (ADR-014)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-flutter
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-python
      - uses: ./.github/actions/verify-versions

      - name: melos bootstrap
        run: fvm dart pub global activate melos && fvm dart pub global run melos bootstrap

      - name: Run codegen
        run: bash tools/gen.sh

      # ── Pass 1 ──────────────────────────────────────────────────────────────
      # Build release APKs and hash every APK produced under
      # build/app/outputs/flutter-apk/ that matches the release pattern.
      # ABI splits produce app-<abi>-release.apk; a universal APK (if enabled)
      # would be app-release.apk. We hash both.
      - name: Build release APK — pass 1
        run: |
          fvm flutter build apk --release
          # Discover all release APKs dynamically (TD-C6 fix).
          # Sort by filename so the hash set is deterministic.
          find build/app/outputs/flutter-apk -name '*-release.apk' -o -name 'app-release.apk' | sort | \
            xargs sha256sum > /tmp/hash1.txt
          echo "── Pass 1 APK hashes ──"
          cat /tmp/hash1.txt

      - name: Clean + rebuild — pass 2
        run: |
          fvm flutter clean
          fvm flutter pub get
          fvm flutter build apk --release
          find build/app/outputs/flutter-apk -name '*-release.apk' -o -name 'app-release.apk' | sort | \
            xargs sha256sum > /tmp/hash2.txt
          echo "── Pass 2 APK hashes ──"
          cat /tmp/hash2.txt

      - name: Compare hashes
        run: |
          # Compare the full hash manifest (filename + sha256 per line).
          # A single byte difference in any APK, a missing APK, or an extra
          # APK will surface as a diff.
          if ! diff -u /tmp/hash1.txt /tmp/hash2.txt; then
            echo "::error::Release APKs are not reproducible (ADR-014). See diff above."
            exit 1
          fi
          echo "✅ Reproducible — all release APKs byte-identical across two clean builds."
          echo "   APK count: $(wc -l < /tmp/hash1.txt)"

  python-wheel-fingerprint:
    name: Python wheel fingerprint (ADR-007/018)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
      - name: Resolve wheels for each ABI + record fingerprint
        run: |
          cd python
          # Phase 0: requirements.lock is empty. The fingerprint check
          # asserts that an empty lockfile produces an empty wheel set.
          if [ -s requirements.lock ]; then
            pip download --no-deps --dest /tmp/wheels -r requirements.lock
            sha256sum /tmp/wheels/* | sort > /tmp/wheel-fingerprint.txt
            cat /tmp/wheel-fingerprint.txt
          else
            echo "Phase 0: requirements.lock empty; no wheels to fingerprint."
          fi
