# =============================================================================
# MediaHub v2 — Nightly workflow (ADR-015/017)
# =============================================================================
# Heavier checks: reproducibility (ADR-014) + Python wheel fingerprint.
name: nightly

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  reproducibility:
    name: Reproducibility check (ADR-014)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-flutter
      - uses: ./.github/actions/setup-java
      - uses: ./.github/actions/setup-python
      - uses: ./.github/actions/verify-versions

      - name: melos bootstrap
        run: |
          rm -rf ~/.pub-cache/global_packages/melos
          fvm flutter pub global activate melos
          fvm exec melos bootstrap

      - name: Run codegen
        run: bash tools/gen.sh

      - name: Build release APK — pass 1
        run: |
          fvm flutter build apk --release
          find build/app/outputs/flutter-apk -name '*-release.apk' -o -name 'app-release.apk' | sort | \
            xargs sha256sum > /tmp/hash1.txt
          echo "── Pass 1 APK hashes ──"
          cat /tmp/hash1.txt

      - name: Clean + rebuild — pass 2
        run: |
          fvm flutter clean
          fvm flutter pub get
          fvm flutter build apk --release
          find build/app/outputs/flutter-apk -name '*-release.apk' -o -name 'app-release.apk' | sort | \
            xargs sha256sum > /tmp/hash2.txt
          echo "── Pass 2 APK hashes ──"
          cat /tmp/hash2.txt

      - name: Compare hashes
        run: |
          if ! diff -u /tmp/hash1.txt /tmp/hash2.txt; then
            echo "::error::Release APKs are not reproducible (ADR-014). See diff above."
            exit 1
          fi
          echo "✅ Reproducible — all release APKs byte-identical across two clean builds."

  python-wheel-fingerprint:
    name: Python wheel fingerprint (ADR-007/018)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
      - name: Resolve wheels for each ABI + record fingerprint
        run: |
          cd python
          if [ -s requirements.lock ]; then
            pip download --no-deps --dest /tmp/wheels -r requirements.lock
            sha256sum /tmp/wheels/* | sort > /tmp/wheel-fingerprint.txt
            cat /tmp/wheel-fingerprint.txt
          else
            echo "Phase 0: requirements.lock empty; no wheels to fingerprint."
          fi
