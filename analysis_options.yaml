# =============================================================================
# MediaHub v2 — Static analysis configuration (root)
# Authority: SAD ADR-002 (dependency rule), ADR-003 (Riverpod), ADR-015 (CI)
# =============================================================================
# This is the root analysis_options. Package-level files extend/include this.
# Phase 0 only enables foundational lint groups; feature-specific rules are
# added per-phase.

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Treat these as errors (build-breaking) per ADR-002:
    invalid_annotation_target: ignore
    missing_required_param: error
    missing_return: error
    todo: ignore               # tracked elsewhere
  exclude:
    - "**/*.g.dart"            # generated
    - "**/*.freezed.dart"      # generated
    - "**/*.drift.dart"        # generated
    - "**/pigeon/**"           # schema source
    - "**/.dart_tool/**"
    - "**/build/**"

  # Enable custom_lint (riverpod_lint) — ADR-003.
  # import_lint removed in Bootstrap Validation (analyzer version conflict);
  # replaced by tools/check_imports.sh (grep-based). See DEVIATIONS.md.
  plugins:
    - custom_lint

linter:
  rules:
    # ── Anti-v1-failure rules ──────────────────────────────────────────────────
    avoid_print: true                # ADR-010: use AppLogger, never print()
    always_declare_return_types: true
    avoid_dynamic_calls: true
    avoid_returning_null_for_future: true
    avoid_type_to_string: true
    cancel_subscriptions: true
    close_sinks: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_final_locals: true
    prefer_single_quotes: true
    require_trailing_commas: true
    sort_constructors_first: true
    sort_unnamed_constructors_first: true
    unawaited_futures: true
    unnecessary_await_in_return: true
    use_super_parameters: true

    # ── Clean-Architecture guardrails (ADR-002) ─────────────────────────────────
    # (Structural rules — only the domain package enforces 'no Flutter import'
    # via its own analysis_options; see packages/domain/analysis_options.yaml.)
    library_private_types_in_public_api: true
    # 'one_of' removed in Bootstrap Validation — not a recognised lint rule.

# import_lint config removed in Bootstrap Validation — see DEVIATIONS.md.
# The ADR-002 dependency rule is encoded in packages/tooling/import_lint/config.yaml
# as documentation; enforcement is via tools/check_imports.sh (grep-based) in CI.
