# =============================================================================
# MediaHub v2 — Melos configuration (FIXED)
# =============================================================================
# FIX: Scripts use flutter/dart directly (no fvm prefix).
# FVM is for local dev only; CI uses flutter-action directly.

name: mediahub_v2

repository: https://github.com/moussabahouzi-ui/mediahub_vv2

packages:
  - packages/**
  - .

command:
  bootstrap:
    runPubGetInParallel: true
    enforceLockfile: true

scripts:
  gen:
    description: "Run build_runner + pigeon across all packages."
    run: bash tools/gen.sh

  gen:clean:
    description: "Clean build_runner outputs."
    run: dart run build_runner clean

  analyze:
    description: "flutter analyze + custom_lint + ADR-002 import check."
    run: |
      flutter analyze .
      dart run custom_lint
      bash tools/check_imports.sh

  format:
    description: "Apply dart format."
    run: dart format .

  format:check:
    description: "Verify dart format compliance (CI)."
    run: dart format --set-exit-if-changed .

  test:unit:
    description: "Pure-Dart + Flutter unit tests."
    run: |
      flutter test packages/domain/test
      flutter test packages/data/test
      flutter test packages/application/test
      flutter test packages/sync_engine/test
      flutter test packages/python_bridge/test

  test:widget:
    description: "Widget tests in app/test."
    run: flutter test test/

  build:debug:
    description: "Debug APK."
    run: flutter build apk --debug

  build:release:
    description: "Release APK (unsigned in CI, signed locally if key.properties exists)."
    run: flutter build apk --release

  build:appbundle:
    description: "Release AAB (Play format)."
    run: flutter build appbundle --release

ide:
  intellij:
    enabled: false
