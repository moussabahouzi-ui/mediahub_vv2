# =============================================================================
# MediaHub v2 — Root pubspec (application)
# Authority: SAD ADR-001, ADR-002, ADR-003, ADR-004, ADR-014
# =============================================================================

name: mediahub_v2
description: "MediaHub v2 — offline-first Android client (Flutter + embedded Python)."
publish_to: "none"
version: 0.0.1+1

environment:
  sdk: ">=3.7.0 <4.0.0"
  flutter: ">=3.29.0 <3.30.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.27

  dio: ^5.7.0

  flutter_secure_storage: ^9.2.2

  sentry_flutter: ^8.10.1
  logging: ^1.3.0

  workmanager: ^0.5.2

  path: ^1.9.0
  path_provider: ^2.1.5

  mediahub_domain:
    path: packages/domain
  mediahub_application:
    path: packages/application
  mediahub_data:
    path: packages/data
  mediahub_design_system:
    path: packages/design_system
  mediahub_python_bridge:
    path: packages/python_bridge
  mediahub_sync_engine:
    path: packages/sync_engine

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3
  drift_dev: ^2.21.0
  pigeon: ^22.7.0

  flutter_lints: ^4.0.0
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.5

  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0

  melos: ^6.2.0

flutter:
  uses-material-design: true

  assets:
    - assets/python/
    - assets/python/mediahub/
